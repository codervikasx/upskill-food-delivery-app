<!DOCTYPE html>
<html>
<head>
    <title>Explore Restaurants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary px-4">
        <span class="navbar-brand">FoodExpress</span>
        <div>
            <a href="/cart" class="btn btn-light btn-sm">My Cart</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>
    <div class="container mt-5">
        <h3>Available Restaurants</h3>
        <div class="row mt-4">
            {% for rest in restaurants %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ rest.restaurant_name }}</h5>
                        <p class="card-text text-muted">{{ rest.address }}</p>
                        <a href="/restaurant/{{ rest.id }}" class="btn btn-primary">View Menu</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
